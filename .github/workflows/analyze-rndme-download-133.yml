name: Analyze rndme/download compromised CDN (issue 133)

on:
  workflow_dispatch:

permissions: read-all

jobs:
  analyze-download-js:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch compromised CDN copy from danml.com
        continue-on-error: true
        run: |
          curl -fsSL "https://danml.com/js/download.js" -o download-cdn.js
          echo "=== File size ==="
          wc -c download-cdn.js
          echo "=== SHA256 ==="
          sha256sum download-cdn.js

      - name: Fetch legitimate copy from GitHub (rndme/download)
        run: |
          curl -fsSL "https://raw.githubusercontent.com/rndme/download/master/download.js" -o download-legit.js
          echo "=== Legitimate file SHA256 ==="
          sha256sum download-legit.js

      - name: Diff CDN vs legitimate source
        continue-on-error: true
        run: |
          echo "=== Unified diff (CDN vs GitHub) ==="
          diff -u download-legit.js download-cdn.js || true

      - name: Show obfuscation markers in CDN copy
        run: |
          echo "=== eval / obfuscated code indicators ==="
          grep -nE "eval\(|typeof [a-z]{4}==|parseInt\(|split\('\|'\)|_0x[0-9a-f]{4,}|\(function\(_0x|0x[0-9a-f]{2,}\)" download-cdn.js || echo "(none found)"
          echo "=== token() call ==="
          grep -n "token()" download-cdn.js || echo "(none found)"
          echo "=== tail of CDN file (injected payload region) ==="
          tail -n 60 download-cdn.js

      - name: Install xhr2 for XMLHttpRequest polyfill
        run: npm install xhr2

      - name: Execute CDN copy in Node.js sandbox (trigger C2 callback)
        continue-on-error: true
        run: |
          node - <<'RUNNER'
          const vm = require('vm');
          const fs = require('fs');
          const { XMLHttpRequest } = require('xhr2');

          const code = fs.readFileSync('./download-cdn.js', 'utf8');

          const sandbox = {
            XMLHttpRequest,
            fetch: globalThis.fetch,
            console,
            process,
            require,
            Buffer,
            setTimeout,
            setInterval,
            clearTimeout,
            clearInterval,
            btoa: (s) => Buffer.from(s).toString('base64'),
            atob: (s) => Buffer.from(s, 'base64').toString('ascii'),
            navigator: { msSaveBlob: undefined, userAgent: 'Mozilla/5.0' },
            location: { href: 'https://danml.com/', hostname: 'danml.com' },
            document: {
              createElement: (tag) => ({ click() {}, style: {}, setAttribute() {}, href: '', download: '' }),
              body: { appendChild() {}, removeChild() {} },
            },
            module: { exports: {} },
            exports: {},
          };
          sandbox.window = sandbox;
          sandbox.global = sandbox;

          try {
            vm.runInNewContext(code, sandbox);
            console.log('Script executed OK');
          } catch (e) {
            console.error('Execution error:', e.message);
          }
          RUNNER

      - run: sleep 1m
