name: Install @tanstack/history Compromised Package

on:
  workflow_dispatch:

permissions: read-all

jobs:
  install-tanstack-history:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install @tanstack/history@1.161.12
        continue-on-error: true
        run: |
          npm init -y
          npm install @tanstack/history@1.161.12 2>&1 || true
          sleep 10
