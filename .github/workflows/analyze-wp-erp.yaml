name: Analyze wp-erp (PolinRider malware in webpack.config.js)

on:
  workflow_dispatch:

permissions: read-all

jobs:
  analyze-wp-erp:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout wp-erp at compromised commit
        uses: actions/checkout@v4
        with:
          repository: wp-erp/wp-erp
          ref: e788412ce9c798ef2d1abde19505e0503ae15640

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "14"

      - name: Analyze webpack.config.js (malicious section)
        run: |
          echo "=== File Info ==="
          ls -la webpack.config.js
          echo "=== Lines around L186 (malicious code) ==="
          sed -n '175,200p' webpack.config.js
          echo "=== Full File ==="
          cat webpack.config.js

      - name: Install Python 2
        run: |
          sudo apt-get install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python

      - name: Install Composer dependencies
        continue-on-error: true
        run: |
          composer install
          composer dump-autoload -o

      - name: Install npm dependencies
        continue-on-error: true
        run: |
          npm install

      - name: Run npm build (triggers webpack.config.js)
        continue-on-error: true
        run: |
          npm run build
