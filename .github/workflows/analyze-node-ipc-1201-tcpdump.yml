name: Analyze node-ipc 12.0.1 (tcpdump)

on:
  workflow_dispatch:

permissions: read-all

jobs:
  analyze-node-ipc-tcpdump:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Start tcpdump capture on port 443
        run: |
          set -euo pipefail
          sudo tcpdump -i any port 443 -w /tmp/node-ipc-443.pcap >/tmp/tcpdump-443.log 2>&1 &
          echo $! | sudo tee /tmp/tcpdump-443.pid >/dev/null
          echo "tcpdump started with PID $(cat /tmp/tcpdump-443.pid)"

      - name: Install node-ipc 12.0.1
        continue-on-error: true
        run: |
          npm install node-ipc@12.0.1

      - name: Verify installed package metadata
        run: |
          node -e "const pkg=require('./node_modules/node-ipc/package.json'); console.log('version:', pkg.version);"
          npm view node-ipc@12.0.1 dist.shasum

      - name: Validate npm tarball shasum
        run: |
          set -euo pipefail
          npm pack node-ipc@12.0.1 --silent
          SHA1=$(sha1sum node-ipc-12.0.1.tgz | awk '{print $1}')
          echo "tarball sha1: $SHA1"
          test "$SHA1" = "fe5d107b9d285327af579259a32977c4f475fa26"

      - name: Show CJS tail and obfuscation markers
        run: |
          set -euo pipefail
          CJS=node_modules/node-ipc/node-ipc.cjs
          ESM=node_modules/node-ipc/node-ipc.js
          echo "=== tail of node-ipc.cjs ==="
          tail -n 80 "$CJS"
          echo "=== obfuscation markers in node-ipc.cjs ==="
          grep -nE "0 && \(module\.exports|\(function\(_0x|split\('\|'\)|_0x[0-9a-f]{4,}" "$CJS" || true
          echo "=== check same markers in node-ipc.js (should be absent) ==="
          grep -nE "\(function\(_0x|split\('\|'\)|_0x[0-9a-f]{4,}" "$ESM" || true

      - name: Execute node-ipc CJS entry point (repro trigger)
        continue-on-error: true
        run: |
          node -e "require('./node_modules/node-ipc/node-ipc.cjs'); console.log('CJS loaded')"

      - name: Execute node-ipc ESM entry point (control)
        continue-on-error: true
        run: |
          node --input-type=module -e "import './node_modules/node-ipc/node-ipc.js'; console.log('ESM loaded')"

      - run: sleep 2m

      - name: Stop tcpdump and print capture views
        if: always()
        run: |
          set +e
          if [ -f /tmp/tcpdump-443.pid ]; then
            sudo kill -2 "$(cat /tmp/tcpdump-443.pid)"
            sleep 2
          fi
          echo "=== tcpdump stderr/log ==="
          sudo cat /tmp/tcpdump-443.log || true

          echo "=== Human-readable packets for port 443 ==="
          sudo tcpdump -nn -tttt -r /tmp/node-ipc-443.pcap || true

          echo "=== UDP/443 packet view ==="
          sudo tcpdump -nn -tttt -r /tmp/node-ipc-443.pcap 'udp port 443' || true

          echo "=== Attempt forced DNS decode on UDP/443 ==="
          sudo tcpdump -nn -vvv -s0 -T dns -r /tmp/node-ipc-443.pcap 'udp port 443' || true

      - name: Upload tcpdump artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-ipc-1201-tcpdump
          path: |
            /tmp/node-ipc-443.pcap
            /tmp/tcpdump-443.log
          if-no-files-found: warn
