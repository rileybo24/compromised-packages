name: Install durabletask 2

on:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2.14.0
        with:
          egress-policy: audit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install durabletask from local tarball
        continue-on-error: true
        run: pip install durabletask-1.4.3.tar.gz

      - name: Import durabletask to trigger runtime payload
        continue-on-error: true
        run: |
          python3 -c "import durabletask; print('durabletask imported')"
          sleep 10s

      - name: Inspect managed.pyz
        continue-on-error: true
        run: |
          echo "=== zip table of contents ==="
          python3 -m zipfile -l /tmp/managed.pyz
          echo "=== extract and cat each .py file ==="
          python3 -m zipfile -e /tmp/managed.pyz /tmp/managed_extracted/
          find /tmp/managed_extracted -name "*.py" | sort | while read f; do
            echo "--- $f ---"
            cat "$f"
          done
          echo "=== base64 (for clean extraction) ==="
          base64 /tmp/managed.pyz

      - name: Upload managed.pyz as artifact
        uses: actions/upload-artifact@v4
        with:
          name: managed-pyz
          path: /tmp/managed.pyz

      - name: Let the payload execute
        run: |
          sleep 10
