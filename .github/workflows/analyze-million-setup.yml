name: Analyze million .vscode/setup.mjs

on:
  workflow_dispatch:

permissions: read-all

jobs:
  analyze-million-setup:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Checkout aidenybai/million main branch
        uses: actions/checkout@v4
        with:
          repository: aidenybai/million
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # - name: Show .vscode directory contents
      #   run: |
      #     echo "=== setup.mjs ==="
      #     cat .vscode/setup.mjs
      #     echo "=== index.js ==="
      #     cat .vscode/index.js

      - name: Run setup.mjs
        continue-on-error: true
        run: node .vscode/setup.mjs

      - run: sleep 1m
